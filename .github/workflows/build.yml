name: Build MacroTweak

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install ldid make
        echo "PATH=$(brew --prefix make)/libexec/gnubin:$PATH" >> $GITHUB_ENV

    - name: Setup Theos
      run: |
        export THEOS=$PWD/theos
        echo "THEOS=$THEOS" >> $GITHUB_ENV

        # Clone Theos if not exists
        if [ ! -d "$THEOS" ]; then
          git clone --recursive https://github.com/theos/theos.git  $THEOS
        fi

        # Create sdks directory if it doesn't exist
        mkdir -p $THEOS/sdks

        # Download SDKs if not present
        if [ ! -d "$THEOS/sdks/iPhoneOS16.5.sdk" ] && [ ! -d "$THEOS/sdks/iPhoneOS17.0.sdk" ]; then
          cd $THEOS/sdks
          curl -LO https://github.com/theos/sdks/archive/master.zip 
          unzip -q master.zip
          mv sdks-master/*.sdk . 2>/dev/null || true
          rm -rf master.zip sdks-master
          cd -
        fi

        echo "Theos setup complete"
        ls -la $THEOS/sdks/

    - name: Build Tweak (Jailed)
      run: |
        cd MacroTweak
        export JAILED=1
        make clean
        make

    - name: Prepare Artifact
      run: |
        mkdir -p artifacts

        # Find the built dylib
        DYLIB_PATH=$(find MacroTweak -name "MacroTweak.dylib" | head -n 1)

        if [ -f "$DYLIB_PATH" ]; then
          echo "Found dylib at: $DYLIB_PATH"
          cp "$DYLIB_PATH" artifacts/MacroTweak.dylib

          # Fix rpath for LiveContainer
          install_name_tool -change /Library/Frameworks/CydiaSubstrate.framework/CydiaSubstrate @rpath/CydiaSubstrate.framework/CydiaSubstrate artifacts/MacroTweak.dylib || true

          # Verify
          otool -L artifacts/MacroTweak.dylib | head -5
        else
          echo "Error: MacroTweak.dylib not found"
          find MacroTweak -name "*.dylib" -o -name "*.so" 2>/dev/null
          exit 1
        fi

        # Create info file - using printf to avoid heredoc YAML issues
        printf "%s\n" "MacroTweak for LiveContainer" "Built on: $(date)" "" "Installation:" "1. Copy MacroTweak.dylib to LiveContainer/Tweaks/YourAppBundleID/" "2. Ensure CydiaSubstrate.framework is in the same folder" "3. Restart app in LiveContainer" "" "Usage:" "- Long press blue button to record" "- Tap blue button to playback (2s delay to cancel)" "- Tap orange button during delay to cancel" "- Tap red button to stop recording" > artifacts/README.txt

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MacroTweak-dylib
        path: artifacts/

    - name: Create Release
      if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/MacroTweak.dylib
        body: |
          MacroTweak for LiveContainer

          ## Installation
          1. Download `MacroTweak.dylib`
          2. Copy to `LiveContainer/Tweaks/[YourAppBundleID]/`
          3. Ensure `CydiaSubstrate.framework` is in the same folder
          4. Restart app in LiveContainer

          ## Usage
          - **Long press** the floating blue button to start recording
          - **Tap** the button to playback recorded macro (2 second delay to cancel)
          - **Tap** the orange button during the delay to cancel playback
          - **Tap** the red button to stop recording

          ## Features
          - Records touch events (location, phase, timestamp)
          - Persists macros between sessions
          - 30-second auto-stop for recording
          - Visual overlay with status indicators
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
