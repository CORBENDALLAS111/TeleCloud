name: Build MacroTweak for LiveContainer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install ldid make
        echo "PATH=$(brew --prefix make)/libexec/gnubin:$PATH" >> $GITHUB_ENV

    - name: Setup Theos
      run: |
        export THEOS=$PWD/theos
        echo "THEOS=$THEOS" >> $GITHUB_ENV
        echo "THEOS_MAKE_PATH=$THEOS/makefiles" >> $GITHUB_ENV

        # Clone Theos if not exists
        if [ ! -d "$THEOS" ]; then
          git clone --recursive https://github.com/theos/theos.git $THEOS
        fi

        # Create sdks directory if it doesn't exist
        mkdir -p $THEOS/sdks

        # Download SDKs if not present
        if [ ! -d "$THEOS/sdks/iPhoneOS16.5.sdk" ] && [ ! -d "$THEOS/sdks/iPhoneOS17.0.sdk" ]; then
          cd $THEOS/sdks
          curl -LO https://github.com/theos/sdks/archive/master.zip 
          unzip -q master.zip
          mv sdks-master/*.sdk . 2>/dev/null || true
          rm -rf master.zip sdks-master
          cd -
        fi

        echo "Theos setup complete"
        ls -la $THEOS/sdks/

    - name: Build Tweak (Jailed for LiveContainer)
      run: |
        cd MacroTweak
        export JAILED=1
        export THEOS=../theos
        make clean
        make

    - name: Prepare Artifact
      run: |
        mkdir -p artifacts

        # Find the built dylib
        DYLIB_PATH=$(find MacroTweak -name "MacroTweak.dylib" | head -n 1)

        if [ -f "$DYLIB_PATH" ]; then
          echo "Found dylib at: $DYLIB_PATH"
          cp "$DYLIB_PATH" artifacts/MacroTweak.dylib

          # Additional rpath fixes for LiveContainer
          install_name_tool -change /Library/Frameworks/CydiaSubstrate.framework/CydiaSubstrate @rpath/CydiaSubstrate.framework/CydiaSubstrate artifacts/MacroTweak.dylib || true
          install_name_tool -id @rpath/MacroTweak.dylib artifacts/MacroTweak.dylib || true

          # Add rpath entries
          install_name_tool -add_rpath @loader_path/Frameworks artifacts/MacroTweak.dylib 2>/dev/null || true
          install_name_tool -add_rpath @executable_path/Frameworks artifacts/MacroTweak.dylib 2>/dev/null || true

          echo "Final dylib info:"
          otool -L artifacts/MacroTweak.dylib
          echo "Rpath info:"
          otool -l artifacts/MacroTweak.dylib | grep -A2 LC_RPATH || true
        else
          echo "Error: MacroTweak.dylib not found"
          find MacroTweak -name "*.dylib" 2>/dev/null
          exit 1
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MacroTweak-LiveContainer
        path: artifacts/

    - name: Create Release
      if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/MacroTweak.dylib
        body: |
          MacroTweak for LiveContainer (Jailed)

          ## Installation
          1. Download `MacroTweak.dylib`
          2. Copy to `LiveContainer/Documents/Tweaks/[YourAppBundleID]/`
          3. **IMPORTANT**: Ensure `CydiaSubstrate.framework` is in the same folder
          4. Enable JIT if available (tweaks work better with JIT)
          5. Launch the app in LiveContainer

          ## What You Should See
          - A floating blue button in the top-right corner of the app
          - Long-press to record, tap to play (with 2s cancel delay)
          - Status label showing recording/playback state

          ## Troubleshooting
          - If no button appears, check that CydiaSubstrate.framework is present
          - Try enabling JIT in LiveContainer settings
          - Check LiveContainer logs for injection errors
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
